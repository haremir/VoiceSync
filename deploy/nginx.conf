server {
    listen 80;
    listen [::]:80;
    server_name voicesync.domain.com;

    # Redirect all HTTP requests to HTTPS permanently
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name voicesync.domain.com;

    # Let's Encrypt SSL Certificates configuration
    ssl_certificate /etc/letsencrypt/live/voicesync.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voicesync.domain.com/privkey.pem;

    # Modern SSL configuration recommendations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Main application Reverse Proxy (FastAPI server inside Docker)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 30s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for low latency response streaming
        proxy_buffering off;
    }

    # Static Audio Files direct disk reading optimization
    # Serves generated MP3 files directly without hitting FastAPI
    location /audio/ {
        alias /srv/voicesync/outputs/;
        autoindex off;
        
        # Aggressive caching for 30 days
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS support for remote WP/Umbraco players
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }
}
